site_name: OpenClaw 中文安装与使用手册
site_description: OpenClaw 中文教程，覆盖安装、初始化、ClawHub 与常用应用场景
repo_name: Bald0Wang/hand-on-openclaw
repo_url: https://github.com/Bald0Wang/hand-on-openclaw
docs_dir: doc

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

